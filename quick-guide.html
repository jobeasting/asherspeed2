<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Works — Quick Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --black:#0d0d0d; --white:#f5f2ed; --court:#c8860a; --muted:#6b7280; --border:#e2ddd6; }
body { background:#f5f2ed; font-family:'Barlow',sans-serif; font-size:13px; color:var(--black); min-height:100vh; }
.header { background:var(--black); color:var(--white); padding:20px 28px 16px; }
.back-link { display:inline-flex; align-items:center; gap:5px; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(245,242,237,0.4); text-decoration:none; margin-bottom:12px; transition:color .15s; }
.back-link:hover { color:var(--court); }
.header-tag { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--court); margin-bottom:4px; }
.header h1 { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:800; text-transform:uppercase; letter-spacing:-.01em; line-height:1; }
.header h1 span { color:var(--court); }
.header-sub { font-size:12px; color:rgba(245,242,237,0.4); margin-top:5px; }
.week-tabs { background:var(--black); border-top:1px solid rgba(255,255,255,0.08); display:flex; overflow-x:auto; padding:0 28px; }
.week-tabs::-webkit-scrollbar { display:none; }
.wtab { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:12px 18px; color:rgba(245,242,237,0.35); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:color .15s,border-color .15s; user-select:none; }
.wtab:hover { color:rgba(245,242,237,0.7); }
.wtab.active { color:var(--court); border-bottom-color:var(--court); }
.main { max-width:900px; margin:0 auto; padding:24px 24px 48px; }
.week-page { display:none; }
.week-page.active { display:block; }
.wk-header { background:var(--black); color:var(--white); border-radius:8px; padding:18px 22px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.wk-num { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--court); margin-bottom:3px; }
.wk-title { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:800; text-transform:uppercase; letter-spacing:-.01em; line-height:1; }
.wk-focus { font-size:12px; color:rgba(245,242,237,0.5); margin-top:5px; max-width:500px; }
.int-badge { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:4px 12px; border-radius:3px; flex-shrink:0; }
.int-build { background:rgba(26,140,110,0.2); color:#4ecfa8; }
.int-easy { background:rgba(26,111,181,0.2); color:#6eb8f5; }
.int-hard { background:rgba(200,134,10,0.2); color:#f0b83a; }
.box { background:#fff; border:1px solid var(--border); border-radius:8px; padding:14px 18px; margin-bottom:12px; }
.box-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; padding-bottom:7px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.box-time { font-size:11px; font-weight:600; background:#f5f2ed; border-radius:20px; padding:2px 9px; color:var(--muted); }
.wu-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.wu-item { background:#f9f7f4; border:1px solid var(--border); border-radius:4px; padding:6px 5px; text-align:center; }
.wu-n { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:800; color:var(--court); line-height:1; }
.wu-name { font-size:9px; font-weight:600; color:var(--black); margin-top:2px; line-height:1.2; }
.session-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.sblock { background:#fff; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.sb-head { background:#f9f7f4; padding:9px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sb-name { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.02em; }
.sb-time { font-size:11px; color:var(--muted); font-weight:600; }
.sb-body { padding:10px 14px; }
.drow { display:flex; align-items:baseline; gap:6px; padding:4px 0; border-bottom:1px solid #f5f2ed; font-size:12px; }
.drow:last-child { border-bottom:none; }
.drow::before { content:"→"; color:var(--court); font-weight:700; flex-shrink:0; font-size:10px; }
.d-name { font-weight:600; flex:1; }
.d-spec { font-size:11px; color:var(--muted); flex-shrink:0; }
.load-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
.load-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.load-track { height:5px; background:#eee; border-radius:3px; margin-bottom:3px; }
.load-fill { height:100%; border-radius:3px; }
.load-pct { font-size:11px; font-weight:600; }
.cnote { background:#fffbf0; border-left:3px solid var(--court); border-radius:0 8px 8px 0; padding:12px 16px; font-size:12px; color:#4a3800; line-height:1.6; margin-bottom:12px; }
.cnote strong { font-weight:700; color:var(--black); font-size:10px; text-transform:uppercase; letter-spacing:.07em; display:block; margin-bottom:3px; }
.cool-box { background:#fff; border:1px solid var(--border); border-radius:8px; padding:12px 18px; font-size:12px; color:#555; line-height:1.65; }
footer { background:var(--black); color:rgba(245,242,237,0.2); text-align:center; padding:16px; font-size:11px; }
@media print {
  .header,.week-tabs,footer { display:none !important; }
  .week-page { display:block !important; page-break-after:always; }
  body { background:white; padding:0; }
  .main { padding:16px; }
}
@media (max-width:600px) {
  .main { padding:14px 12px 40px; }
  .session-grid { grid-template-columns:1fr; }
  .wu-grid { grid-template-columns:repeat(4,1fr); }
  .load-grid { grid-template-columns:repeat(3,1fr); }
  .header { padding:16px 16px 12px; }
  .week-tabs { padding:0 12px; }
}
</style>
</head>
<body>

<div class="header">
  <a class="back-link" href="index.html">&#8592; Speed Works</a>
  <div class="header-tag">Basketball Athlete Development</div>
  <h1>Quick <span>Guide</span></h1>
  <div class="header-sub">6 weeks &nbsp;·&nbsp; once per week &nbsp;·&nbsp; 45 min &nbsp;·&nbsp; minimal equipment</div>
</div>

<div class="week-tabs">
  <div class="wtab active" onclick="setWeek(0)">Week 1</div>
  <div class="wtab" onclick="setWeek(1)">Week 2</div>
  <div class="wtab" onclick="setWeek(2)">Week 3</div>
  <div class="wtab" onclick="setWeek(3)">Week 4</div>
  <div class="wtab" onclick="setWeek(4)">Week 5</div>
  <div class="wtab" onclick="setWeek(5)">Week 6</div>
</div>

<div class="main" id="pages"></div>

<footer>Speed Works &nbsp;·&nbsp; Quick Guide &nbsp;·&nbsp; 6-Week Speed &amp; Plyometrics</footer>

<script>
const WU=[
  {n:1,nm:"Jog"},{n:2,nm:"High knees"},{n:3,nm:"Butt kicks"},{n:4,nm:"Light skips"},
  {n:5,nm:"3-step squat"},{n:6,nm:"3-step kick"},{n:7,nm:"3-step lunge & twist"},
  {n:8,nm:"3-step hip hug"},{n:9,nm:"Hip flex & open"},{n:10,nm:"3-step SL RDL"},
  {n:11,nm:"Quad & reach"},{n:12,nm:"Ham scoop"},{n:13,nm:"Straight-leg kicks"},{n:14,nm:"Anklers"}
];

const W=[
  {int:"Build",focus:"Learn landing mechanics, sprint posture, and basic footwork. Quality over speed.",
   blocks:[
     {nm:"Speed mechanics",t:"10 min",ds:[{n:"A-skip",s:"2×20m"},{n:"B-skip",s:"2×20m"},{n:"Falling start sprint",s:"4×10m"},{n:"Standing broad jump",s:"3×3"}]},
     {nm:"Vertical jump",t:"10 min",ds:[{n:"Squat jump",s:"3×5"},{n:"Countermovement jump",s:"3×5"},{n:"Box step-up + jump",s:"2×5 each"}]},
     {nm:"Change of direction",t:"10 min",ds:[{n:"5-10-5 pro agility",s:"4 reps"},{n:"Two-cone lateral shuffle",s:"3×10m"},{n:"3-cone L-drill",s:"4 reps"}]}
   ],load:{speed:30,cod:30,vert:25,bound:10,agil:30},
   note:"Stick landing is the #1 priority. Every jump sticks for 2 full seconds. Noisy or caving landings — slow down and reset."},

  {int:"Build",focus:"Add reps and distance. Introduce lateral bounds and bounding.",
   blocks:[
     {nm:"Speed + acceleration",t:"12 min",ds:[{n:"A-skip",s:"2×30m"},{n:"Falling start sprint",s:"5×10m"},{n:"Half kneeling start",s:"4×10m"},{n:"20m build-up sprint",s:"3×"},{n:"Alt-leg bound",s:"3×20m"}]},
     {nm:"Bounding intro",t:"8 min",ds:[{n:"Standing broad jump",s:"3×3"},{n:"Alt-leg bound",s:"3×20m"},{n:"Single-leg hop",s:"2×10m each"}]},
     {nm:"Vertical + lateral",t:"10 min",ds:[{n:"Countermovement jump",s:"4×5"},{n:"Lateral bound",s:"3×4 each"},{n:"Skater jump",s:"3×6 each"}]},
     {nm:"Agility",t:"7 min",ds:[{n:"T-drill",s:"4×"},{n:"Cone weave",s:"3×"}]}
   ],load:{speed:45,cod:40,vert:40,bound:35,agil:45},
   note:"Watch knee cave on lateral bounds — toes forward, knee tracks over second toe on every landing."},

  {int:"Build",focus:"Push reps higher, add sprint volume, introduce depth drops. Hardest session of the first half.",
   blocks:[
     {nm:"Speed — accel + max",t:"12 min",ds:[{n:"Falling start 10m",s:"4×"},{n:"Aggressive crouch start",s:"4×10m"},{n:"Flying 20m",s:"4×"},{n:"Top-speed 30m",s:"3×"},{n:"Single-leg hop",s:"2×10m each"}]},
     {nm:"Plyometrics — vertical",t:"12 min",ds:[{n:"Depth drop → jump",s:"3×5"},{n:"Tuck jump",s:"3×5"},{n:"Countermovement jump",s:"4×5"},{n:"Single-leg jump",s:"2×5 each"}]},
     {nm:"Change of direction",t:"8 min",ds:[{n:"5-10-5 timed",s:"5×, 60s rest"},{n:"L-drill",s:"4×"},{n:"Lateral bound seq.",s:"4×4 each"}]}
   ],load:{speed:60,cod:55,vert:60,bound:50,agil:55},
   note:"Depth drops: step off the box, don't jump off. Hit ground → immediate takeoff. Walk through it first rep every set."},

  {int:"Easy",focus:"Cut volume ~40%. Let the body absorb weeks 1–3. Adaptation happens here.",
   blocks:[
     {nm:"Speed — light",t:"10 min",ds:[{n:"A-skip",s:"2×20m"},{n:"Falling start sprint",s:"3× @ 85%"},{n:"20m build-up",s:"2×"},{n:"Standing broad jump",s:"3×3 (easy)"}]},
     {nm:"Jumps — quality only",t:"8 min",ds:[{n:"Broad jump",s:"3×3"},{n:"Countermovement jump",s:"3×4"},{n:"Lateral bound",s:"2×3 each"}]},
     {nm:"Agility — relaxed",t:"8 min",ds:[{n:"T-drill",s:"3× (smooth)"},{n:"Cone weave",s:"2×"},{n:"3-cone L-drill",s:"3× (smooth)"}]}
   ],load:{speed:30,cod:25,vert:25,bound:20,agil:25},
   note:"This session should feel almost easy. That is correct. Protect the deload — adaptation happens in recovery."},

  {int:"Hard",focus:"Highest intensity of the program. Max-effort sprints, reactive jumps, competitive agility.",
   blocks:[
     {nm:"Max speed",t:"12 min",ds:[{n:"Flying 20m",s:"5×, 90s rest"},{n:"Top-speed 40m",s:"3×"},{n:"Sprint from def. stance",s:"4×"},{n:"Alt-leg bound",s:"4×25m"}]},
     {nm:"Plyometrics — reactive",t:"12 min",ds:[{n:"Depth jump",s:"4×5"},{n:"Alt-leg bound",s:"4×25m"},{n:"Reactive tuck jump",s:"3×5"},{n:"SL lateral hop",s:"3×5 each"}]},
     {nm:"Agility — competitive",t:"8 min",ds:[{n:"Mirror drill",s:"5×20s"},{n:"5-10-5 PB attempt",s:"4 timed"},{n:"Cone reaction drill",s:"4×"}]}
   ],load:{speed:90,cod:80,vert:85,bound:85,agil:80},
   note:"Full recovery between sprint reps is mandatory — 60–90s minimum. Fatigued sprints reinforce bad mechanics."},

  {int:"Hard",focus:"Apply everything. Test improvements, leave feeling fast and confident.",
   blocks:[
     {nm:"Speed — test",t:"12 min",ds:[{n:"10m sprint TEST",s:"3×, best time"},{n:"Flying 20m",s:"3×"},{n:"Full 40m sprint",s:"2–3×"},{n:"Alt-leg bound TEST",s:"2×25m, count strides"}]},
     {nm:"Vertical + bounding",t:"10 min",ds:[{n:"Max vert jump TEST",s:"5×, mark wall"},{n:"Broad jump TEST",s:"3×, measure"},{n:"Alt-leg bound",s:"3×25m"}]},
     {nm:"Agility gauntlet",t:"8 min",ds:[{n:"T-drill TIMED",s:"3×, best"},{n:"5-10-5 TIMED",s:"3×, best"},{n:"Mirror drill",s:"3×20s"},{n:"3-cone L-drill TIMED",s:"3×, best"}]}
   ],load:{speed:85,cod:80,vert:80,bound:75,agil:80},
   note:"Week 6 is partly a test. Max effort on timed drills — seeing real improvement is powerful confidence fuel heading into the season."}
];

const LC={speed:"#1a8c6e",cod:"#6b4fcf",vert:"#c8860a",bound:"#c44a2a",agil:"#1a6fb5"};
const LL={speed:"Speed",cod:"Change of dir",vert:"Vertical",bound:"Bounding",agil:"Agility"};

function build(w,i){
  const ic=w.int==='Hard'?'int-hard':w.int==='Easy'?'int-easy':'int-build';

  let wu=`<div class="box"><div class="box-label"><span>Dynamic warm-up &nbsp;·&nbsp; every session &nbsp;·&nbsp; 1 length each (~20 yds) &nbsp;·&nbsp; walk back recovery</span><span class="box-time">10 min</span></div><div class="wu-grid">`;
  WU.forEach(d=>{ wu+=`<div class="wu-item"><div class="wu-n">${d.n}</div><div class="wu-name">${d.nm}</div></div>`; });
  wu+=`</div></div>`;

  let sg=`<div class="session-grid">`;
  w.blocks.forEach(b=>{
    sg+=`<div class="sblock"><div class="sb-head"><span class="sb-name">${b.nm}</span><span class="sb-time">${b.t}</span></div><div class="sb-body">`;
    b.ds.forEach(d=>{ sg+=`<div class="drow"><span class="d-name">${d.n}</span><span class="d-spec">${d.s}</span></div>`; });
    sg+=`</div></div>`;
  });
  sg+=`</div>`;

  let lb=`<div class="box"><div class="box-label" style="margin-bottom:10px;"><span>Training emphasis</span></div><div class="load-grid">`;
  Object.keys(LL).forEach(k=>{
    const v=w.load[k];
    lb+=`<div><div class="load-label">${LL[k]}</div><div class="load-track"><div class="load-fill" style="width:${v}%;background:${LC[k]};"></div></div><div class="load-pct" style="color:${LC[k]};">${v}%</div></div>`;
  });
  lb+=`</div></div>`;

  const cool=`<div class="cool-box"><strong style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b7280;display:block;margin-bottom:4px;">Cool-down &nbsp;·&nbsp; 5–7 min</strong>Walk, breathe, and spend time on whatever feels tight — hips, quads, hamstrings, and calves did the most work. Move slowly and listen to your body.</div>`;

  return `<div class="week-page${i===0?' active':''}" id="wp${i}">
    <div class="wk-header">
      <div><div class="wk-num">Week ${i+1} of 6</div><div class="wk-title">Week ${i+1}</div><div class="wk-focus">${w.focus}</div></div>
      <div class="int-badge ${ic}">${w.int}</div>
    </div>
    ${wu}${sg}${lb}
    <div class="cnote"><strong>Coach note</strong>${w.note}</div>
    ${cool}
  </div>`;
}

const pg=document.getElementById('pages');
W.forEach((w,i)=>{ pg.innerHTML+=build(w,i); });

function setWeek(i){
  document.querySelectorAll('.wtab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.week-page').forEach((p,j)=>p.classList.toggle('active',i===j));
}
</script>
</body>
</html>
